<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — CreatorPost</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <style>
    .account-layout {
      max-width: 600px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
    }

    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1.25rem;
    }

    .card-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .field-row {
      margin-bottom: 1.25rem;
    }

    .field-row:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .field-value {
      font-size: 0.95rem;
      color: var(--text);
      padding: 0.6rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 100%;
      box-sizing: border-box;
      opacity: 0.6;
    }

    .plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(124,58,237,0.15);
      color: var(--accent-light);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 6px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .connected-count {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .connected-count strong { color: var(--text); }

    .status-msg {
      font-size: 0.85rem;
      padding: 0.6rem 0.9rem;
      border-radius: 8px;
      margin-top: 1rem;
      display: none;
    }
    .status-msg.success { background: rgba(74,222,128,0.1); color: #4ade80; display: block; }
    .status-msg.error   { background: rgba(248,113,113,0.1); color: #f87171; display: block; }
  </style>
</head>
<body>

  <!-- ── Nav ── -->
  <nav>
    <a href="/" class="logo">
      <img src="/logo.png" alt="CreatorPost" class="logo-img" />
      Creator<span>Post</span>
    </a>
    <ul>
      <li><a href="/dashboard">Dashboard</a></li>
    </ul>
    <div id="nav-account" style="display:flex;align-items:center;gap:0.75rem;">
      <span style="font-size:0.85rem;color:var(--muted)">Loading…</span>
    </div>
  </nav>

  <div class="account-layout">
    <div class="page-title">Account</div>

    <!-- Profile -->
    <div class="profile-card">
      <div class="card-section-title">Profile</div>

      <div class="field-row">
        <label class="field-label">Email</label>
        <div class="field-value" id="field-email">—</div>
      </div>

      <div class="field-row">
        <label class="field-label" for="field-display-name">Display name</label>
        <input
          id="field-display-name"
          class="input"
          type="text"
          placeholder="Your name"
          maxlength="50"
          style="width:100%;box-sizing:border-box"
        />
      </div>

      <button id="save-btn" class="btn btn-primary" onclick="saveProfile()">Save changes</button>
      <div id="status-msg" class="status-msg"></div>
    </div>

    <!-- Plan -->
    <div class="profile-card">
      <div class="card-section-title">Plan</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
        <div>
          <span class="plan-badge">✦ Free</span>
          <p style="font-size:0.85rem;color:var(--muted);margin:0.5rem 0 0">
            Upgrade to Pro for unlimited posts, multiple accounts, and priority support.
          </p>
        </div>
        <button class="btn btn-outline" disabled style="opacity:0.4;cursor:not-allowed">Upgrade — coming soon</button>
      </div>
    </div>

    <!-- Connected accounts -->
    <div class="profile-card">
      <div class="card-section-title">Connected accounts</div>
      <div id="connected-summary" class="connected-count">Loading…</div>
      <a href="/dashboard" style="display:inline-block;margin-top:1rem;font-size:0.85rem;color:var(--accent-light)">
        Manage accounts →
      </a>
    </div>

    <!-- Danger zone -->
    <div class="profile-card" style="border-color:rgba(248,113,113,0.3)">
      <div class="card-section-title" style="color:#f87171">Danger zone</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
        <div>
          <div style="font-size:0.9rem;font-weight:600">Log out</div>
          <div style="font-size:0.8rem;color:var(--muted);margin-top:0.2rem">Sign out of your CreatorPost session.</div>
        </div>
        <a href="/auth/logout" class="btn btn-outline" style="color:#f87171;border-color:#f87171">Log out</a>
      </div>
    </div>
  </div>

  <script>
    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let user = {};

    async function loadProfile() {
      const res  = await fetch('/api/me');
      if (res.status === 401) { window.location.href = '/login'; return; }
      const data = await res.json();

      user = data.user ?? {};
      const accounts = data.accounts ?? [];

      // Email
      document.getElementById('field-email').textContent = user.email ?? '—';

      // Display name
      document.getElementById('field-display-name').value = user.display_name ?? '';

      // Nav
      const label   = user.display_name || user.email || '';
      const initial = label ? label[0].toUpperCase() : '?';
      document.getElementById('nav-account').innerHTML = `
        <span style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;flex-shrink:0">${escHtml(initial)}</span>
        <span style="font-size:0.85rem;color:var(--muted)">${escHtml(label)}</span>
        <a href="/auth/logout" style="font-size:0.8rem;color:var(--muted);margin-left:0.25rem">Log out</a>`;

      // Connected accounts summary
      const byPlatform = accounts.reduce((acc, a) => {
        acc[a.platform] = (acc[a.platform] ?? 0) + 1;
        return acc;
      }, {});
      const summary = Object.entries(byPlatform)
        .map(([p, n]) => `<strong>${n}</strong> ${p.charAt(0).toUpperCase() + p.slice(1)}`)
        .join(' · ');
      document.getElementById('connected-summary').innerHTML =
        accounts.length ? summary : 'No accounts connected yet.';
    }

    async function saveProfile() {
      const btn         = document.getElementById('save-btn');
      const display_name = document.getElementById('field-display-name').value.trim();
      const statusEl    = document.getElementById('status-msg');

      btn.disabled    = true;
      btn.textContent = 'Saving…';
      statusEl.className = 'status-msg';

      const res  = await fetch('/api/profile', {
        method:  'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ display_name }),
      });
      const data = await res.json();

      if (res.ok) {
        user.display_name = data.display_name;
        statusEl.textContent  = 'Saved!';
        statusEl.className    = 'status-msg success';
        // Update nav label
        const label   = user.display_name || user.email || '';
        const initial = label ? label[0].toUpperCase() : '?';
        document.getElementById('nav-account').innerHTML = `
          <span style="width:28px;height:28px;border-radius:50%;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;flex-shrink:0">${escHtml(initial)}</span>
          <span style="font-size:0.85rem;color:var(--muted)">${escHtml(label)}</span>
          <a href="/auth/logout" style="font-size:0.8rem;color:var(--muted);margin-left:0.25rem">Log out</a>`;
      } else {
        statusEl.textContent = data.error ?? 'Failed to save.';
        statusEl.className   = 'status-msg error';
      }

      btn.disabled    = false;
      btn.textContent = 'Save changes';
      setTimeout(() => { statusEl.className = 'status-msg'; }, 3000);
    }

    loadProfile();
  </script>
</body>
</html>
