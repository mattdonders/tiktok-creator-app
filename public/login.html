<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){var t=localStorage.getItem('creatorpost-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — CreatorPost</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <style>
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
    }
    .auth-logo img { width: 32px; height: 32px; border-radius: 8px; }
    .auth-logo span { color: var(--accent-light); }
    .auth-card h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    .auth-card p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }
    .input-group { margin-bottom: 1rem; }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .input-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.75rem 1rem;
      transition: border-color 0.15s;
    }
    .input-group input:focus { border-color: var(--accent); outline: none; }
    .auth-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.75rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.5rem;
    }
    .auth-btn:hover { background: var(--accent-hover); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .auth-msg {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      display: none;
    }
    .auth-msg.success {
      background: var(--status-published-bg);
      border: 1px solid var(--status-published-bg);
      color: var(--status-published-fg);
    }
    .auth-msg.error {
      background: var(--status-failed-bg);
      border: 1px solid var(--status-failed-bg);
      color: var(--status-failed-fg);
    }
    .auth-fine {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      margin-top: 1.5rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo"><img src="/logo.png" alt="CreatorPost" class="logo-img" />Creator<span>Post</span></a>
    <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark theme">
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </nav>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="/logo.png" alt="CreatorPost" />
        Creator<span>Post</span>
      </div>
      <h1>Sign in</h1>
      <p>Enter your email and we'll send you a magic link — no password needed.</p>

      <form id="login-form" onsubmit="sendLink(event)">
        <div class="input-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <button type="submit" class="auth-btn" id="submit-btn">Send magic link</button>
      </form>

      <div class="auth-msg" id="auth-msg"></div>

      <p class="auth-fine">
        By signing in, you agree to our
        <a href="/terms">Terms</a> and <a href="/privacy">Privacy Policy</a>.
      </p>
    </div>
  </div>

  <script>
    // Pre-fill email from localStorage if available
    const savedEmail = localStorage.getItem('cp_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
    }

    // Show error from query param (e.g. expired link)
    const params = new URLSearchParams(location.search);
    if (params.get('error') === 'expired') {
      showMsg('That link has expired or already been used. Request a new one below.', 'error');
    }

    async function sendLink(e) {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const email = document.getElementById('email').value;

      btn.disabled    = true;
      btn.textContent = 'Sending…';

      try {
        const res  = await fetch('/auth/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('cp_email', email);
          document.getElementById('login-form').style.display = 'none';
          showMsg(`Magic link sent to ${email} — check your inbox!`, 'success');
        } else {
          showMsg(data.error ?? 'Something went wrong.', 'error');
          btn.disabled    = false;
          btn.textContent = 'Send magic link';
        }
      } catch {
        showMsg('Network error. Please try again.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Send magic link';
      }
    }

    function showMsg(text, type) {
      const el      = document.getElementById('auth-msg');
      el.textContent = text;
      el.className   = `auth-msg ${type}`;
      el.style.display = 'block';
    }

    function toggleTheme() {
      const next = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('creatorpost-theme', next);
      _syncThemeIcon();
    }
    function _syncThemeIcon() {
      const isDark = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
      const sun  = document.getElementById('icon-sun');
      const moon = document.getElementById('icon-moon');
      if (sun)  sun.style.display  = isDark ? '' : 'none';
      if (moon) moon.style.display = isDark ? 'none' : '';
    }
    document.addEventListener('DOMContentLoaded', _syncThemeIcon);
  </script>
</body>
</html>
