name = "creatorpost"
pages_build_output_dir = "public"
compatibility_date = "2024-09-02"

[[d1_databases]]
binding     = "DB"
database_name = "creatorpost"
database_id = "REPLACE_WITH_D1_ID"  # run: wrangler d1 create creatorpost

# Secrets — set in Cloudflare Pages dashboard (Settings → Environment variables):
#   TIKTOK_CLIENT_ID
#   TIKTOK_CLIENT_SECRET
#   RESEND_API_KEY
