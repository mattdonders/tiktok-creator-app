name = "creatorpost-callback"
main = "worker/callback.js"
compatibility_date = "2024-09-02"
compatibility_flags = ["nodejs_compat"]

# Routes: intercept /callback on the Pages domain
[[routes]]
pattern = "tiktok.mattdonders.com/callback"
zone_name = "mattdonders.com"

[vars]
REDIRECT_URI = "https://tiktok.mattdonders.com/callback"

# Secrets (set via CLI — never commit these):
#   wrangler secret put TIKTOK_CLIENT_ID
#   wrangler secret put TIKTOK_CLIENT_SECRET
#   wrangler secret put DISCORD_WEBHOOK_URL
